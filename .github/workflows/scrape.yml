name: CG Jobs Scrape

on:
  schedule:
    - cron: "*/10 * * * *"   # Every 10 minutes
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write            # required to push data files back

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pdf2image pytesseract PyMuPDF

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the relevant files
          git add "*.json" "*.js" || true

          # Skip if nothing changed
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: routine scrape [skip ci]"

          # Authenticate via HTTPS using GITHUB_TOKEN
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # Retry push up to 3 times on transient failures (e.g. 503)
          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."
            git push origin HEAD && break
            if [ $attempt -lt 3 ]; then
              echo "Push failed, retrying in 15 seconds..."
              sleep 15
            else
              echo "All push attempts failed."
              exit 1
            fi
          done